<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B35B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EE4B8B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DEF8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bgGradient)"/>
  
  <!-- Main 3D Building Block -->
  <!-- Top face (brightest) -->
  <path d="M280 380 L512 240 L744 380 L512 520 Z" fill="#FFFFFF" fill-opacity="1"/>
  
  <!-- Left face (medium) -->
  <path d="M280 380 L512 520 L512 720 L280 580 Z" fill="#FFFFFF" fill-opacity="0.7"/>
  
  <!-- Right face (darker) -->
  <path d="M744 380 L512 520 L512 720 L744 580 Z" fill="#FFFFFF" fill-opacity="0.5"/>
  
  <!-- Plus/Add symbol on top (tool indicator) -->
  <rect x="472" y="340" width="80" height="24" rx="4" fill="#6B35B8" fill-opacity="0.9"/>
  <rect x="500" y="312" width="24" height="80" rx="4" fill="#6B35B8" fill-opacity="0.9"/>
  
  <!-- Small connector blocks (showing modular/building nature) -->
  <!-- Bottom left small block -->
  <path d="M200 560 L280 520 L360 560 L360 640 L280 680 L200 640 Z" fill="#FFFFFF" fill-opacity="0.4"/>
  
  <!-- Bottom right small block -->
  <path d="M664 560 L744 520 L824 560 L824 640 L744 680 L664 640 Z" fill="#FFFFFF" fill-opacity="0.4"/>
  
  <!-- Subtle glow/highlight -->
  <ellipse cx="512" cy="380" rx="200" ry="60" fill="#FFFFFF" fill-opacity="0.1"/>
</svg>
